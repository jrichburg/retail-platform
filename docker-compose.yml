version: '3.8'

services:
  # Local PostgreSQL for development (mirrors Supabase in production)
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail_dev
      POSTGRES_DB: retail_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local Redis for development (mirrors Upstash in production)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
